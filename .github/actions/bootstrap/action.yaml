name: "Bootstrap"

description: "Bootstrap all tools and dependencies"

runs:
  using: "composite"
  steps:
    # note: go mod and build is automatically cached on default with v4+
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        check-latest: true

    - name: Install go dependencies
      shell: bash
      run: go mod download

    - name: Install tools
      uses: anchore/workflows/.github/actions/binny@91139bea23527e94db5a1e9e9b77ad2975417930 # v0.2.0

